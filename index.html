<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eidi Distribution 2026</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Hind+Siliguri:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Grainy Texture Overlay */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
        }

        /* Floating Icons Animation */
        .floating-icon {
            position: fixed;
            color: rgba(16, 185, 129, 0.15); /* Emerald with low opacity */
            pointer-events: none;
            z-index: 1;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Custom glow for the festive look */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(16, 185, 129, 0.1);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Hind Siliguri', 'sans-serif'],
                        cursive: ['Great Vibes', 'cursive']
                    },
                    colors: {
                        brand: '#10b981', 
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-gradient-to-tr from-emerald-50 via-white to-amber-50 min-h-screen text-slate-800 font-sans antialiased overflow-x-hidden transition-colors duration-500 relative flex flex-col items-center">

    <div class="grain-overlay"></div>

    <i class="fa-solid fa-moon floating-icon text-4xl" style="left: 10%; animation-duration: 25s; animation-delay: -2s;"></i>
    <i class="fa-solid fa-moon floating-icon text-4xl" style="left: 50%; animation-duration: 25s; animation-delay: -2s;"></i>
    <i class="fa-solid fa-moon floating-icon text-4xl" style="left: 80%; animation-duration: 25s; animation-delay: -2s;"></i>
    <i class="fa-solid fa-moon floating-icon text-4xl" style="left: 60%; animation-duration: 25s; animation-delay: -2s;"></i>
    <i class="fa-solid fa-star floating-icon text-2xl" style="left: 50%; animation-duration: 18s; animation-delay: -5s;"></i>
    <i class="fa-solid fa-star floating-icon text-2xl" style="left: 40%; animation-duration: 18s; animation-delay: -5s;"></i>
    <i class="fa-solid fa-star floating-icon text-2xl" style="left: 25%; animation-duration: 18s; animation-delay: -6s;"></i>
    <i class="fa-solid fa-star floating-icon text-2xl" style="left: 20%; animation-duration: 18s; animation-delay: -4s;"></i>
    <i class="fa-solid fa-lamp-tertiary floating-icon text-3xl" style="left: 40%; animation-duration: 27s; animation-delay: -15s;"></i>
    <i class="fa-solid fa-star-and-crescent floating-icon text-2xl" style="left: 60%; animation-duration: 20s; animation-delay: -8s;"></i>

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div id="vvip-modal"
        class="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-500 bg-black/40 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full mx-4 transform scale-50 transition-transform duration-500"
            id="vvip-modal-content">
            <div class="text-center">
                <i class="fa-solid fa-crown text-5xl text-amber-400 mb-4 animate-bounce"></i>
                <h3 class="text-2xl font-black text-emerald-600 mb-2">ভিভিআইপি এলার্ট!</h3>
                <p id="vvip-modal-message" class="text-gray-600 font-medium text-lg"></p>
            </div>
            <button
                onclick="document.getElementById('vvip-modal').classList.add('opacity-0', 'pointer-events-none'); document.getElementById('vvip-modal-content').classList.replace('scale-100', 'scale-50');"
                class="mt-6 w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full text-white font-bold pointer-events-auto shadow-md">
                ওকে বুঝছি
            </button>
        </div>
    </div>

    <main class="w-full max-w-2xl px-6 pb-20 flex-1 relative z-10 flex flex-col">
        <section class="max-w-4xl mx-auto px-4 pt-6 pb-10 sm:pt-10 sm:pb-16" id="main-header">
            <div class="relative w-full aspect-video mb-8 overflow-hidden rounded-2xl bg-gray-100 shadow-sm border border-emerald-100">
                <img src="assets/uilpg.jpg" alt="Eid Mubarak 2026" class="w-full h-full object-cover" />
            </div>

            <div class="text-center space-y-3">
                <h1 class="text-4xl sm:text-6xl font-bold text-emerald-900 tracking-tight flex items-center justify-center gap-3">
                    সালামি<i class="fa-solid fa-fan text-amber-400 text-2xl animate-spin-slow"></i>
                </h1>
                <div class="w-16 h-1 bg-amber-300 mx-auto rounded-full"></div>
                <p class="text-lg sm:text-xl font-medium text-emerald-700/60 max-w-md mx-auto leading-relaxed" id="t-hero-subtitle">
                    দেখা যাক এই ঈদে তোমার সালামি কত?
                </p>
            </div>
        </section>

        <div class="relative w-full flex-1 flex flex-col items-center">

            <section id="phase-1" class="phase-section active w-full flex-col align-center space-y-12">
                <div class="w-full text-center">
                    <label for="user-name" class="block text-3xl font-bold text-emerald-900 mb-6" id="t-p1-name-label">আগে বলো, তুমি কে?</label>
                    <input type="text" id="user-name"
                        class="appearance-none block w-full px-4 py-3 bg-white/50 border-b-2 border-emerald-200 text-center text-4xl sm:text-5xl font-black focus:outline-none focus:border-emerald-500 transition-all"
                        placeholder="তোমার নাম দাও" autocomplete="off" oninput="app.checkPhase1Ready()">
                </div>

                <div id="loyalty-container" class="w-full text-center opacity-0 transition-opacity duration-500 pointer-events-none">
                    <label class="block text-2xl font-bold text-emerald-800/80 mb-6" id="t-p1-dropdown-label">আমাদের শেষ দেখা কবে?</label>
                    <div class="flex flex-wrap justify-center gap-3">
                        <button type="button" class="pill-option px-6 py-3 rounded-full text-lg font-bold text-emerald-700 bg-white border border-emerald-100 hover:bg-emerald-50 transition-all" onclick="app.selectLoyalty(2.0, this)" id="t-opt-7days">এই সপ্তাহে</button>
                        <button type="button" class="pill-option px-6 py-3 rounded-full text-lg font-bold text-emerald-700 bg-white border border-emerald-100 hover:bg-emerald-50 transition-all" onclick="app.selectLoyalty(1.0, this)" id="t-opt-2weeks">গত ২ সপ্তাহে</button>
                        <button type="button" class="pill-option px-6 py-3 rounded-full text-lg font-bold text-emerald-700 bg-white border border-emerald-100 hover:bg-emerald-50 transition-all" onclick="app.selectLoyalty(0.5, this)" id="t-opt-1month">গত মাসে</button>
                        <button type="button" class="pill-option px-6 py-3 rounded-full text-lg font-bold text-emerald-700 bg-white border border-emerald-100 hover:bg-emerald-50 transition-all" onclick="app.selectLoyalty(0.1, this)" id="t-opt-ghost">আমি একটা ভূত</button>
                    </div>
                </div>
            </section>

            <section id="phase-2" class="phase-section w-full flex-col items-center text-center space-y-8 mt-4 absolute top-0 left-0 transition-all">
                <div class="w-full glass-panel rounded-[2.5rem] p-10">
                    <p class="text-emerald-500 font-extrabold text-2xl mb-2" id="t-p2-owes">তুমি পাবে</p>
                    <h2 class="text-[5.5rem] sm:text-[7.5rem] font-black text-slate-800 leading-none mb-2">
                        <span id="calculated-amount">0</span><span class="text-4xl text-amber-500 ml-2">TK</span>
                    </h2>
                    <p class="text-slate-400 font-medium">মুকতাদিরের পক্ষ থেকে</p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 w-full justify-center mt-8">
                    <button id="btn-coward" class="px-8 py-4 text-xl font-bold rounded-full text-emerald-700 bg-white/80 border border-emerald-100 hover:bg-white transition-all">
                        <span id="t-btn-coward">এইটাই নিয়ে নিই</span>
                    </button>
                    <button id="btn-gamble" class="px-8 py-4 text-xl font-extrabold rounded-full text-white bg-gradient-to-r from-emerald-500 to-teal-500 shadow-lg shadow-emerald-200/50 animate-pulse transition-all transform hover:scale-105">
                        <span id="t-btn-gamble">১০০ টাকার ঝুঁকি নাও</span> <i class="fa-solid fa-wand-magic-sparkles ml-1"></i>
                    </button>
                </div>
            </section>

            <section id="phase-3" class="phase-section w-full flex-col items-center space-y-8 mt-4 absolute top-0 left-0 transition-all">
                <div class="text-center w-full mb-4">
                    <h2 class="text-4xl font-extrabold text-emerald-900" id="t-p3-title">ভাগ্য যাচাই</h2>
                    <p class="text-amber-600 font-medium mt-2" id="t-p3-subtitle">সোনালি আবরণ মুছে ফেলুন</p>
                </div>
                <div class="relative w-full max-w-sm aspect-square mx-auto rounded-[2.5rem] overflow-hidden shadow-2xl border-[6px] border-white z-20">
                    <div id="scratch-result" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-emerald-50">
                        <div id="scratch-icon" class="text-7xl mb-4 opacity-0 transform scale-50 transition-all duration-700"></div>
                        <div id="scratch-amount-display" class="text-5xl font-black mb-2 opacity-0 transform translate-y-4 transition-all duration-700 text-emerald-900"></div>
                        <div id="scratch-message" class="text-lg font-bold opacity-0 transition-opacity duration-700 bg-white px-4 py-2 rounded-xl mt-2"></div>
                    </div>
                    <canvas id="scratch-canvas" class="absolute inset-0 w-full h-full cursor-pointer touch-none z-10"></canvas>
                </div>
                <div id="p3-action-container" class="w-full pt-6 opacity-0 pointer-events-none flex justify-center">
                    <button id="btn-next-p4" class="px-10 py-4 text-xl font-extrabold rounded-full text-white bg-emerald-600 shadow-xl">
                        <span id="t-btn-next">ঈদি সংগ্রহ করো</span> <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </section>

            <section id="phase-4" class="phase-section w-full flex-col align-center mt-4 absolute top-0 left-0 text-center space-y-10 transition-all">
                <div class="glass-panel rounded-[2.5rem] p-8">
                    <p class="text-emerald-600 font-bold mb-2 uppercase text-sm" id="t-p4-final">সর্বমোট পরিমাণ</p>
                    <h2 class="text-7xl font-black text-emerald-900">
                        <span id="final-amount">0</span> TK
                    </h2>
                </div>
                <div class="w-full text-center mt-8">
                    <label for="bkash-number" class="block text-3xl font-bold text-emerald-900 mb-6" id="t-p4-bkash-label">বিকাশ নম্বর দাও</label>
                    <input type="tel" id="bkash-number" maxlength="11"
                        class="appearance-none block w-full px-4 py-3 bg-white/50 text-center text-4xl sm:text-5xl font-black focus:outline-none border-b-2 border-emerald-100 focus:border-emerald-500 tracking-widest text-emerald-600"
                        placeholder="০১৭••••••••" oninput="app.checkPhase4Ready()">
                </div>
                <div id="p4-submit-container" class="w-full text-center opacity-0 pointer-events-none pt-4 flex justify-center">
                    <button id="btn-request-eidi" class="px-10 py-5 text-2xl font-black rounded-full text-white bg-emerald-500 shadow-lg w-full max-w-sm transition-transform hover:scale-105">
                        <span id="btn-request-content" class="flex justify-center items-center gap-2">
                            <span id="t-btn-request">পাঠিয়ে দাও!</span> <i class="fa-solid fa-paper-plane"></i>
                        </span>
                        <span id="btn-request-spinner" class="hidden absolute inset-0 flex items-center justify-center bg-emerald-500 rounded-full">
                            <i class="fa-solid fa-circle-notch fa-spin text-white text-3xl"></i>
                        </span>
                    </button>
                </div>
            </section>

            <section id="phase-5" class="phase-section w-full flex-col items-center space-y-8 mt-4 absolute top-0 left-0 transition-all text-center">
                <div class="relative w-48 h-48 mx-auto mt-4">
                    <div id="status-processing" class="absolute inset-0 flex flex-col items-center justify-center">
                        <div class="w-20 h-20 rounded-full border-4 border-amber-400 border-t-transparent animate-spin mb-4"></div>
                        <h2 class="text-3xl font-black text-amber-500" id="t-status-p-title">অপেক্ষা করো...</h2>
                    </div>
                    <div id="status-done" class="absolute inset-0 flex flex-col items-center justify-center opacity-0 scale-50 transition-all duration-500">
                        <div class="w-24 h-24 rounded-full bg-emerald-100 flex items-center justify-center mb-4">
                            <i class="fa-solid fa-check text-5xl text-emerald-600"></i>
                        </div>
                        <h2 class="text-4xl font-black text-emerald-600" id="t-status-d-title">সম্পন্ন!</h2>
                    </div>
                </div>
                <div class="w-full max-w-md mt-6">
                    <p class="text-xl font-medium text-emerald-800/70 mb-6" id="status-message">রিকোয়েস্ট গেছে মুকতাদিরের কাছে।</p>
                    <div class="bg-white/80 p-6 rounded-[2rem] border border-emerald-50 shadow-sm text-center">
                        <div class="py-3 flex justify-between border-b border-emerald-50">
                            <span class="text-emerald-700/50 font-bold text-sm">নাম</span>
                            <span id="status-name" class="font-bold text-emerald-900">User</span>
                        </div>
                        <div class="py-3 flex justify-between">
                            <span class="text-emerald-700/50 font-bold text-sm">পরিমাণ</span>
                            <span class="font-black text-emerald-600"><span id="status-amount">0</span> TK</span>
                        </div>
                    </div>
                </div>
                
                <div id="download-container" class="w-full text-center pt-4 opacity-0 transition-opacity duration-500 pointer-events-none mt-2">
                    <button id="btn-download-card" class="px-8 py-4 text-lg font-bold rounded-full text-white bg-gradient-to-r from-amber-500 to-amber-600 shadow-lg shadow-amber-200/50 w-full max-w-sm transition-transform hover:scale-105 flex justify-center items-center gap-2 mx-auto">
                        <span id="t-btn-download">কার্ড ডাউনলোড করো</span> <i class="fa-solid fa-download"></i>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        window.firebaseApp = { initializeApp };
        window.firebaseFirestore = { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp, onSnapshot, collection, query, where, getDocs };
    </script>
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/scratch.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
