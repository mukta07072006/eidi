<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eidi Admin Panel</title>
    <!-- Tailwind & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px 0 rgba(236, 72, 153, 0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-slate-800 font-sans antialiased text-sm sm:text-base">

    <!-- Login Screen -->
    <div id="login-container" class="min-h-screen flex items-center justify-center p-4 relative z-20">
        <div class="glass-panel rounded-3xl p-8 max-w-md w-full text-center">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 mb-6">Admin Login</h1>
            <input type="email" id="admin-email" placeholder="Email" class="w-full px-4 py-3 rounded-xl border border-gray-200 mb-4 focus:outline-none focus:border-pink-500">
            <input type="password" id="admin-password" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 mb-6 focus:outline-none focus:border-pink-500">
            <button id="btn-login" class="w-full py-4 bg-gradient-to-r from-pink-500 to-violet-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all">
                Login
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-4 font-medium hidden">Invalid credentials.</p>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-container" class="hidden min-h-screen flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-chart-pie text-pink-500 text-2xl"></i>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">Eidi Center</h1>
            </div>
            <button id="btn-logout" class="px-4 py-2 text-sm font-bold text-gray-500 hover:text-red-500 transition-colors bg-gray-100 hover:bg-red-50 rounded-lg">
                Logout <i class="fa-solid fa-right-from-bracket ml-1"></i>
            </button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
            <div class="glass-panel bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/80 border-b border-gray-100">
                                <th class="p-4 font-bold text-gray-500 uppercase text-xs tracking-wider">Name (ID)</th>
                                <th class="p-4 font-bold text-gray-500 uppercase text-xs tracking-wider">Step Reached</th>
                                <th class="p-4 font-bold text-gray-500 uppercase text-xs tracking-wider">Details</th>
                                <th class="p-4 font-bold text-gray-500 uppercase text-xs tracking-wider">Final Amount</th>
                                <th class="p-4 font-bold text-gray-500 uppercase text-xs tracking-wider">bKash Info</th>
                                <th class="p-4 font-bold text-gray-500 uppercase text-xs tracking-wider">Started At</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-100">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
                <!-- Loading State -->
                <div id="table-loading" class="p-12 text-center text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i>
                    <p class="font-medium">Loading tracking data...</p>
                </div>
                <div id="table-empty" class="hidden p-12 text-center text-gray-400">
                    <i class="fa-solid fa-inbox text-4xl mb-3 text-gray-300"></i>
                    <p class="font-medium text-gray-500">No requests tracked yet.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Expose to admin.js
        window.firebaseAdminApp = { initializeApp };
        window.firebaseAdminAuth = { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut };
        window.firebaseAdminFirestore = { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc };
    </script>

    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
